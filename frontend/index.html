<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Resume Review</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Resume Review</h1>

<section id="view-upload" class="card">
  <p>Upload a resume PDF to parse it.</p>
  <input type="file" id="file-input" accept="application/pdf">
  <div style="margin-top: 14px;">
    <button id="upload-btn">Upload &amp; Parse</button>
  </div>
  <p class="error hidden" id="upload-error"></p>
</section>

<section id="view-review" class="card hidden">
  <span class="status">Awaiting review</span>
  <div id="parsed-fields"></div>
  <div style="margin-top: 18px;">
    <button id="approve-btn">Approve</button>
  </div>
  <div style="margin-top: 18px;">
    <label for="corrections-input"><strong>Not quite right?</strong> Describe what to fix:</label>
    <textarea id="corrections-input" placeholder="e.g. the second job's dates are wrong, add my LinkedIn"></textarea>
    <button id="corrections-btn">Send Corrections</button>
  </div>
</section>

<section id="view-approved" class="card hidden">
  <span class="status">Approved</span>
  <div id="approved-fields"></div>
  <div style="margin-top: 18px;">
    <button id="search-jobs-nav-btn">Search for Jobs</button>
    <button id="reset-btn">Review Another Resume</button>
  </div>
</section>

<section id="view-job-search" class="card hidden">
  <span class="status">Job Search</span>
  <div class="field">
    <label for="keywords-input">Keywords</label><br>
    <input type="text" id="keywords-input" placeholder="e.g. python developer">
  </div>
  <div class="field">
    <label for="location-input">Location (optional)</label><br>
    <input type="text" id="location-input" placeholder="e.g. melbourne">
  </div>
  <button id="search-jobs-btn">Search Jobs</button>
  <p class="error hidden" id="search-error"></p>
  <div id="job-results" style="margin-top: 20px;"></div>
</section>

<section id="view-job-picked" class="card hidden">
  <span class="status">Job Picked</span>
  <div id="picked-job-fields"></div>
  <div style="margin-top: 18px;">
    <button id="gap-analysis-btn">Run Gap Analysis</button>
    <button id="generate-tailor-btn">Generate Tailored Docs</button>
  </div>
  <div id="gap-report-fields" style="margin-top: 18px;"></div>
  <div style="margin-top: 18px;">
    <button id="search-again-btn">Search Again</button>
    <button id="start-over-btn">Start Over</button>
  </div>
</section>

<section id="view-tailor-review" class="card hidden">
  <span class="status" id="tailor-status">Awaiting review</span>
  <div id="tailor-fields"></div>
  <div style="margin-top: 18px;">
    <button id="tailor-approve-btn">Approve</button>
  </div>
  <div style="margin-top: 18px;">
    <label for="tailor-corrections-input"><strong>Not quite right?</strong> Describe what to fix:</label>
    <textarea id="tailor-corrections-input" placeholder="e.g. emphasize the Python project more, tone down the cover letter"></textarea>
    <button id="tailor-corrections-btn">Send Corrections</button>
  </div>
  <div style="margin-top: 18px;">
    <button id="tailor-back-btn">Back to Job</button>
  </div>
</section>

<script>
const API_BASE = "http://localhost:8000";
let resumeId = null;
let jobPickId = null;

const viewUpload = document.getElementById("view-upload");
const viewReview = document.getElementById("view-review");
const viewApproved = document.getElementById("view-approved");
const viewJobSearch = document.getElementById("view-job-search");
const viewJobPicked = document.getElementById("view-job-picked");
const viewTailorReview = document.getElementById("view-tailor-review");

const allViews = [viewUpload, viewReview, viewApproved, viewJobSearch, viewJobPicked, viewTailorReview];

function showView(view) {
  allViews.forEach(v => v.classList.add("hidden"));
  view.classList.remove("hidden");
}

function setButtonLoading(button, isLoading, loadingLabel, originalLabel) {
  button.disabled = isLoading;
  button.innerHTML = isLoading
    ? `<span class="spinner"></span>${loadingLabel}`
    : originalLabel;
}

const esc = (s) => (s ?? "").toString();

function renderParsed(container, parsed) {
  let html = "";
  html += field("Name", parsed.name);
  html += field("Email", parsed.email);
  html += field("Phone", parsed.phone);
  html += field("Skills", (parsed.skills || []).join(", "));

  html += `<div class="field"><span class="label">Work History</span>`;
  (parsed.work_history || []).forEach(w => {
    html += `<div class="entry"><strong>${esc(w.title)}</strong> — ${esc(w.company)}<br>
      <span class="label">${esc(w.start)} – ${esc(w.end)}</span></div>`;
  });
  html += `</div>`;

  html += `<div class="field"><span class="label">Projects</span>`;
  (parsed.projects || []).forEach(p => {
    const link = p.url ? ` — <a href="https://${esc(p.url)}" target="_blank" rel="noopener">${esc(p.url)}</a>` : "";
    const highlights = (p.highlights || []).map(h => `<li>${esc(h)}</li>`).join("");
    html += `<div class="entry"><strong>${esc(p.name)}</strong>${link}
      ${highlights ? `<ul>${highlights}</ul>` : ""}</div>`;
  });
  html += `</div>`;

  html += `<div class="field"><span class="label">Education</span>`;
  (parsed.education || []).forEach(e => {
    html += `<div class="entry"><strong>${esc(e.degree)}</strong> — ${esc(e.institution)}<br>
      <span class="label">${esc(e.start)} – ${esc(e.end)}</span></div>`;
  });
  html += `</div>`;

  container.innerHTML = html;

  function field(label, value) {
    return `<div class="field"><span class="label">${label}</span><div class="value">${esc(value)}</div></div>`;
  }
}

let lastSearchResults = [];

function renderJobResults(container, ranked) {
  lastSearchResults = ranked;

  if (!ranked.length) {
    container.innerHTML = `<p>No results. Try different keywords.</p>`;
    return;
  }

  let html = "";
  ranked.forEach((r, i) => {
    const job = r.job;
    const salary = (job.salary_min || job.salary_max)
      ? `<div class="label">Salary: ${esc(job.salary_min ?? "?")} – ${esc(job.salary_max ?? "?")}</div>`
      : "";
    const link = job.url
      ? `<a href="${esc(job.url)}" target="_blank" rel="noopener">View posting</a> · `
      : "";
    html += `<div class="entry">
      <strong>${esc(job.title)}</strong> — ${esc(job.company)}<br>
      <span class="label">${esc(job.location)} · fit score ${esc(r.score)}</span>
      <div class="value">${esc(r.reason)}</div>
      ${salary}
      <div style="margin-top: 8px;">
        ${link}<button data-pick-index="${i}" class="pick-job-btn">Pick this job</button>
      </div>
    </div>`;
  });
  container.innerHTML = html;

  container.querySelectorAll(".pick-job-btn").forEach(btn => {
    btn.addEventListener("click", () => pickJob(lastSearchResults[Number(btn.dataset.pickIndex)]));
  });
}

function renderPickedJob(container, ranked) {
  const job = ranked.job;
  let html = `<div class="entry">
    <strong>${esc(job.title)}</strong> — ${esc(job.company)}<br>
    <span class="label">${esc(job.location)} · fit score ${esc(ranked.score)}</span>
    <div class="value">${esc(ranked.reason)}</div>
  </div>`;
  container.innerHTML = html;
}

async function pickJob(ranked) {
  const res = await fetch(`${API_BASE}/jobs/pick`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ resume_id: resumeId, picked: ranked }),
  });
  const data = await res.json();
  jobPickId = data.job_pick_id;
  document.getElementById("gap-report-fields").innerHTML = "";
  renderPickedJob(document.getElementById("picked-job-fields"), ranked);
  showView(viewJobPicked);
}

function renderGapReport(container, report) {
  const matched = (report.matched_skills || []).map(s => `<li>${esc(s)}</li>`).join("");
  const missing = (report.missing_skills || []).map(s => `<li>${esc(s)}</li>`).join("");
  container.innerHTML = `
    <div class="field">
      <span class="label">Match Score</span>
      <div class="value">${esc(report.match_score)} / 100</div>
    </div>
    <div class="field">
      <span class="label">Matched Skills</span>
      <ul>${matched}</ul>
    </div>
    <div class="field">
      <span class="label">Missing Skills</span>
      <ul>${missing}</ul>
    </div>
  `;
}

function renderTailorDocs(container, tailoredResume, coverLetter) {
  container.innerHTML = `
    <div class="field">
      <span class="label">Tailored Resume</span>
      <pre class="value">${esc(tailoredResume.content)}</pre>
    </div>
    <div class="field">
      <span class="label">Cover Letter</span>
      <pre class="value">${esc(coverLetter.content)}</pre>
    </div>
  `;
}

document.getElementById("upload-btn").addEventListener("click", async () => {
  const button = document.getElementById("upload-btn");
  const fileInput = document.getElementById("file-input");
  const errorEl = document.getElementById("upload-error");
  errorEl.classList.add("hidden");

  if (!fileInput.files.length) {
    errorEl.textContent = "Choose a PDF first.";
    errorEl.classList.remove("hidden");
    return;
  }

  const formData = new FormData();
  formData.append("file", fileInput.files[0]);

  setButtonLoading(button, true, "Uploading &amp; parsing… (a few seconds)", "Upload &amp; Parse");
  try {
    const res = await fetch(`${API_BASE}/resumes`, { method: "POST", body: formData });
    const data = await res.json();

    if (!res.ok) {
      errorEl.textContent = data.detail || "Upload failed.";
      errorEl.classList.remove("hidden");
      return;
    }

    resumeId = data.resume_id;
    renderParsed(document.getElementById("parsed-fields"), data.parsed);
    showView(viewReview);
  } catch (err) {
    errorEl.textContent = "Could not reach the server. Is it running?";
    errorEl.classList.remove("hidden");
  } finally {
    setButtonLoading(button, false, "", "Upload &amp; Parse");
  }
});

document.getElementById("approve-btn").addEventListener("click", async () => {
  const button = document.getElementById("approve-btn");
  setButtonLoading(button, true, "Approving…", "Approve");
  try {
    const res = await fetch(`${API_BASE}/resumes/${resumeId}/parse/approve`, { method: "POST" });
    const data = await res.json();
    renderParsed(document.getElementById("approved-fields"), data.parsed);
    showView(viewApproved);
  } finally {
    setButtonLoading(button, false, "", "Approve");
  }
});

document.getElementById("corrections-btn").addEventListener("click", async () => {
  const button = document.getElementById("corrections-btn");
  const corrections = document.getElementById("corrections-input").value.trim();
  if (!corrections) return;

  setButtonLoading(button, true, "Re-parsing with your notes… (a few seconds)", "Send Corrections");
  try {
    const res = await fetch(`${API_BASE}/resumes/${resumeId}/parse/corrections`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ corrections }),
    });
    const data = await res.json();
    renderParsed(document.getElementById("parsed-fields"), data.parsed);
    document.getElementById("corrections-input").value = "";
  } finally {
    setButtonLoading(button, false, "", "Send Corrections");
  }
});

document.getElementById("reset-btn").addEventListener("click", () => {
  resumeId = null;
  document.getElementById("file-input").value = "";
  showView(viewUpload);
});

document.getElementById("search-jobs-nav-btn").addEventListener("click", () => {
  showView(viewJobSearch);
});

document.getElementById("search-jobs-btn").addEventListener("click", async () => {
  const button = document.getElementById("search-jobs-btn");
  const keywords = document.getElementById("keywords-input").value.trim();
  const location = document.getElementById("location-input").value.trim();
  const errorEl = document.getElementById("search-error");
  errorEl.classList.add("hidden");

  if (!keywords) {
    errorEl.textContent = "Enter some keywords first.";
    errorEl.classList.remove("hidden");
    return;
  }

  setButtonLoading(button, true, "Searching &amp; ranking… (a few seconds)", "Search Jobs");
  try {
    const res = await fetch(`${API_BASE}/jobs/search`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ resume_id: resumeId, keywords, location: location || null }),
    });
    const data = await res.json();

    if (!res.ok) {
      errorEl.textContent = data.detail || "Search failed.";
      errorEl.classList.remove("hidden");
      return;
    }

    renderJobResults(document.getElementById("job-results"), data.jobs);
  } catch (err) {
    errorEl.textContent = "Could not reach the server. Is it running?";
    errorEl.classList.remove("hidden");
  } finally {
    setButtonLoading(button, false, "", "Search Jobs");
  }
});

document.getElementById("gap-analysis-btn").addEventListener("click", async () => {
  const button = document.getElementById("gap-analysis-btn");
  setButtonLoading(button, true, "Analyzing… (a few seconds)", "Run Gap Analysis");
  try {
    const res = await fetch(`${API_BASE}/jobs/${jobPickId}/gap-analysis`, { method: "POST" });
    const data = await res.json();
    renderGapReport(document.getElementById("gap-report-fields"), data.gap_report);
  } finally {
    setButtonLoading(button, false, "", "Run Gap Analysis");
  }
});

document.getElementById("generate-tailor-btn").addEventListener("click", async () => {
  const button = document.getElementById("generate-tailor-btn");
  setButtonLoading(button, true, "Generating… (a few seconds)", "Generate Tailored Docs");
  try {
    const res = await fetch(`${API_BASE}/jobs/${jobPickId}/tailor`, { method: "POST" });
    const data = await res.json();
    document.getElementById("tailor-status").textContent =
      data.status === "awaiting_review" ? "Awaiting review" : data.status;
    renderTailorDocs(document.getElementById("tailor-fields"), data.tailored_resume, data.cover_letter);
    showView(viewTailorReview);
  } finally {
    setButtonLoading(button, false, "", "Generate Tailored Docs");
  }
});

document.getElementById("tailor-approve-btn").addEventListener("click", async () => {
  const button = document.getElementById("tailor-approve-btn");
  setButtonLoading(button, true, "Approving…", "Approve");
  try {
    const res = await fetch(`${API_BASE}/jobs/${jobPickId}/tailor/approve`, { method: "POST" });
    const data = await res.json();
    document.getElementById("tailor-status").textContent =
      data.status === "approved" ? "Approved" : data.status;
    renderTailorDocs(document.getElementById("tailor-fields"), data.tailored_resume, data.cover_letter);
  } finally {
    setButtonLoading(button, false, "", "Approve");
  }
});

document.getElementById("tailor-corrections-btn").addEventListener("click", async () => {
  const button = document.getElementById("tailor-corrections-btn");
  const corrections = document.getElementById("tailor-corrections-input").value.trim();
  if (!corrections) return;

  setButtonLoading(button, true, "Regenerating with your notes… (a few seconds)", "Send Corrections");
  try {
    const res = await fetch(`${API_BASE}/jobs/${jobPickId}/tailor/corrections`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ corrections }),
    });
    const data = await res.json();
    renderTailorDocs(document.getElementById("tailor-fields"), data.tailored_resume, data.cover_letter);
    document.getElementById("tailor-corrections-input").value = "";
  } finally {
    setButtonLoading(button, false, "", "Send Corrections");
  }
});

document.getElementById("tailor-back-btn").addEventListener("click", () => {
  showView(viewJobPicked);
});

document.getElementById("search-again-btn").addEventListener("click", () => {
  document.getElementById("job-results").innerHTML = "";
  showView(viewJobSearch);
});

document.getElementById("start-over-btn").addEventListener("click", () => {
  resumeId = null;
  document.getElementById("file-input").value = "";
  document.getElementById("keywords-input").value = "";
  document.getElementById("location-input").value = "";
  document.getElementById("job-results").innerHTML = "";
  showView(viewUpload);
});
</script>
</body>
</html>
